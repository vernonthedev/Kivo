name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libnm-dev libsoup2.4-dev curl wget libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Kivo ${{ github.ref_name }}"
          releaseBody: |
            Kivo ${{ github.ref_name }}

            A minimal, fast, and modern desktop HTTP client built with Rust and Tauri for simple and efficient API testing.

            Installation

            Windows
            Download the .msi or .exe installer from the assets section below and run it to install Kivo on your system.

            Debian / Ubuntu
            Use the following commands to download and install the .deb package directly from your terminal:
            ```bash
            wget https://github.com/dexter-xD/Kivo/releases/download/${{ github.ref_name }}/kivo_0.1.0_amd64.deb
            sudo dpkg -i kivo_0.1.0_amd64.deb
            sudo apt-get install -f # Fix any missing dependencies
            ```

            Run
            Once installed, launch Kivo from your application menu or by typing:
            ```bash
            kivo
            ```

            Package Info
            - Version: ${{ github.ref_name }}
            - Architecture: amd64 / x64
            - Platforms: Windows (10/11), Linux (Debian/Ubuntu)
            - License: MIT
            - Repository: https://github.com/dexter-xD/Kivo
          projectPath: desktop
